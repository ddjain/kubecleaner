# This rule is not used by the project custom-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the cleanup.kubecleaner.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: custom-operator
    app.kubernetes.io/managed-by: kustomize
  name: kubecleaner-editor-role
rules:
- apiGroups:
  - cleanup.kubecleaner.io
  resources:
  - kubecleaners
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cleanup.kubecleaner.io
  resources:
  - kubecleaners/status
  verbs:
  - get
